name: Weekly MLM Report

on:
  workflow_dispatch:
  schedule:
    # Sunday 19:01 UTC == Monday 00:01 Екатеринбург (GMT+5)
    - cron: "1 19 * * 0"

jobs:
  send-report:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Fetch MLM report text from VPS
        env:
          WEEKLY_REPORT_TOKEN: ${{ secrets.WEEKLY_REPORT_TOKEN }}
        run: |
          set -euo pipefail
          curl -fsS "https://mlm.miniproject.fyi/api/internal/weekly-tg-report?token=${WEEKLY_REPORT_TOKEN}" -o report.txt
          echo "Report fetched, bytes:"
          wc -c report.txt

      - name: Send to Telegram
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN_STAT7744BOT }}
          CHAT_ID: ${{ secrets.TELEGRAM_STATS_CHAT_ID }}
        run: |
          set -euo pipefail
          TEXT="$(cat report.txt)"
          curl -fsS -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            -d "chat_id=${CHAT_ID}" \
            --data-urlencode "text=${TEXT}" \
            -d "disable_web_page_preview=true"
